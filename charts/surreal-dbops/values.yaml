# Default values for surreal-dbops.
replicaCount: 1

image:
  repository: ghcr.io/reliquo/surreal-dbops
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 443
  targetPort: 8443

webhook:
  enabled: true
  port: 8443
  secretName: "surreal-dbops-webhook-tls"
  certManager:
    enabled: true
    # If true, a cert-manager Certificate resource will be generated
    generateCert: true
    # If true, generate an Issuer/ClusterIssuer for the webhook certificate.
    # When enabled, this takes precedence over issuerRef below.
    generateIssuer: true
    generatedIssuer:
      # Optional override. Defaults to "<fullname>-selfsigned".
      name: ""
      # Supported: Issuer or ClusterIssuer
      kind: "Issuer"
      # Optional apiGroup for issuerRef/cert-manager resources
      group: "cert-manager.io"
      # Issuer spec. Defaults to selfSigned when omitted.
      spec:
        selfSigned: {}
    # External issuer reference used when generateIssuer=false.
    issuerRef:
      name: "selfsigned-issuer"
      kind: "ClusterIssuer"
      group: "cert-manager.io"

# Values for the optional cert-manager chart dependency.
# This dependency is enabled when webhook.certManager.enabled=true.
cert-manager:
  # Keep CRD installation on so first-time installs work out of the box.
  installCRDs: true
  # Newer chart line supports this as well; safe to keep for compatibility.
  crds:
    enabled: true
  prometheus:
    enabled: false

# Values for the optional surrealdb chart dependency.
# This dependency is enabled when surrealdb.enabled=true.
surrealdb:
  enabled: true
  surrealdb:
    initial_user: root
    initial_pass: rootpassword
  image:
    tag: v3.1.3

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
