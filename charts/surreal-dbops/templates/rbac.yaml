apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "surreal-dbops.serviceAccountName" . }}
  labels:
    {{- include "surreal-dbops.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "surreal-dbops.fullname" . }}
  labels:
    {{- include "surreal-dbops.labels" . | nindent 4 }}
rules:
  # Permissions to manage logical SurrealDB custom resources
  - apiGroups: ["surreal-dbops.reliquo.io"]
    resources:
      - instances
      - instances/status
      - namespaces
      - namespaces/status
      - databases
      - databases/status
      - schemas
      - schemas/status
      - rollouts
      - rollouts/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions to read secrets and configmaps referenced by spec configurations
  - apiGroups: [""]
    resources:
      - secrets
      - configmaps
      - namespaces
    verbs: ["get", "list", "watch"]

  # Permissions required for MutatingWebhookConfiguration update/self-config if needed,
  # but typically managed by helm directly.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "surreal-dbops.fullname" . }}
  labels:
    {{- include "surreal-dbops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "surreal-dbops.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "surreal-dbops.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
