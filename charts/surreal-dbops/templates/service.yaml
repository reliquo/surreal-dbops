{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "surreal-dbops.fullname" . }}
  labels:
    {{- include "surreal-dbops.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: webhook
      protocol: TCP
      name: webhook
  selector:
    {{- include "surreal-dbops.selectorLabels" . | nindent 4 }}
{{- end }}
