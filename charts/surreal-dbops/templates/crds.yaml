apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: instances.surrealdb.reliquo.io
spec:
  group: surrealdb.reliquo.io
  names:
    kind: Instance
    listKind: InstanceList
    plural: instances
    singular: instance
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [connectionString, username, password]
              properties:
                connectionString: &valueOrRefSource
                  type: object
                  properties:
                    value: { type: string }
                    valueFrom:
                      type: object
                      properties:
                        secretKeyRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                        configMapRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                username: *valueOrRefSource
                password: *valueOrRefSource
            status:
              type: object
              properties:
                connected: { type: boolean }
                error: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: namespaces.surrealdb.reliquo.io
spec:
  group: surrealdb.reliquo.io
  names:
    kind: Namespace
    listKind: NamespaceList
    plural: namespaces
    singular: namespace
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [instanceRef]
              properties:
                instanceRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
            status:
              type: object
              properties:
                created: { type: boolean }
                error: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: schemas.surrealdb.reliquo.io
spec:
  group: surrealdb.reliquo.io
  names:
    kind: Schema
    listKind: SchemaList
    plural: schemas
    singular: schema
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [schema]
              properties:
                revisionHistoryLimit: { type: integer }
                concurrencyLimit: { type: integer }
                requireApproval: { type: string, enum: [destructive, all, none] }
                schema: &valueOrRefSourceSchema
                  type: object
                  properties:
                    value: { type: string }
                    valueFrom:
                      type: object
                      properties:
                        secretKeyRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                        configMapRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                variables:
                  type: object
                  additionalProperties: *valueOrRefSourceSchema
            status:
              type: object
              properties:
                currentVersionHash: { type: string }
                activeRolloutName: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databases.surrealdb.reliquo.io
spec:
  group: surrealdb.reliquo.io
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    singular: database
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [namespaceRef, schemaRef]
              properties:
                namespaceRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                schemaRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
            status:
              type: object
              properties:
                created: { type: boolean }
                appliedSchemaHash: { type: string }
                appliedSchemaGeneration: { type: integer }
                error: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouts.surrealdb.reliquo.io
spec:
  group: surrealdb.reliquo.io
  names:
    kind: Rollout
    listKind: RolloutList
    plural: rollouts
    singular: rollout
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [schemaRef, generation]
              properties:
                schemaRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                generation: { type: integer }
            status:
              type: object
              properties:
                phase: { type: string }
                diff: { type: string }
                destructive: { type: boolean }
                affectedDatabases: { type: integer }
                appliedDatabases: { type: integer }
                failedDatabases: { type: integer }
                approved: { type: boolean }
                approvedBy: { type: string }
                approvedAt: { type: string }
                completedAt: { type: string }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      lastTransitionTime: { type: string }
                      reason: { type: string }
                      message: { type: string }
      subresources:
        status: {}
