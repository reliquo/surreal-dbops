apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: schemas.surreal-dbops.reliquo.io
spec:
  group: surreal-dbops.reliquo.io
  names:
    kind: Schema
    listKind: SchemaList
    plural: schemas
    singular: schema
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [schema]
              properties:
                revisionHistoryLimit: { type: integer }
                concurrencyLimit: { type: integer }
                requireApproval: { type: string, enum: [destructive, all, none] }
                schema: &valueOrRefSourceSchema
                  type: object
                  properties:
                    value: { type: string }
                    valueFrom:
                      type: object
                      properties:
                        secretKeyRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                        configMapRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                variables:
                  type: object
                  additionalProperties: *valueOrRefSourceSchema
            status:
              type: object
              properties:
                currentVersionHash: { type: string }
                activeRolloutName: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}