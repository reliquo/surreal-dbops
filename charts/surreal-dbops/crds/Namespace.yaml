apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: namespaces.surreal-dbops.reliquo.io
spec:
  group: surreal-dbops.reliquo.io
  names:
    kind: Namespace
    listKind: NamespaceList
    plural: namespaces
    singular: namespace
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [instanceRef]
              properties:
                instanceRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
            status:
              type: object
              properties:
                created: { type: boolean }
                error: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}
