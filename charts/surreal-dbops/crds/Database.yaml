apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: databases.surreal-dbops.reliquo.io
spec:
  group: surreal-dbops.reliquo.io
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    singular: database
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [namespaceRef, schemaRef]
              properties:
                namespaceRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                schemaRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
            status:
              type: object
              properties:
                created: { type: boolean }
                appliedSchemaHash: { type: string }
                appliedSchemaGeneration: { type: integer }
                error: { type: string }
                observedGeneration: { type: integer }
      subresources:
        status: {}