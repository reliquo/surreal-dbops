---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouts.surreal-dbops.reliquo.io
spec:
  group: surreal-dbops.reliquo.io
  names:
    categories: []
    kind: Rollout
    plural: rollouts
    shortNames: []
    singular: rollout
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for RolloutSpec via `CustomResource`
        properties:
          spec:
            description: Tracks a schema migration execution.
            properties:
              desiredSchema:
                default: ''
                description: |-
                  Immutable desired schema snapshot for this rollout generation.

                  This allows older rollouts to continue reconciling against the schema content they were created with, even after the Schema resource advances.
                type: string
              generation:
                description: Generation of the Schema that this rollout corresponds to.
                format: int64
                type: integer
              schemaRef:
                description: Reference to the Schema template being rolled out.
                properties:
                  name:
                    type: string
                  namespace:
                    nullable: true
                    type: string
                required:
                - name
                type: object
            required:
            - generation
            - schemaRef
            type: object
          status:
            nullable: true
            properties:
              affectedDatabases:
                format: uint
                minimum: 0.0
                type: integer
              appliedDatabases:
                format: uint
                minimum: 0.0
                type: integer
              approved:
                type: boolean
              approvedAt:
                nullable: true
                type: string
              approvedBy:
                nullable: true
                type: string
              completedAt:
                nullable: true
                type: string
              conditions:
                items:
                  description: Standard Kubernetes Conditions status block.
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              destructive:
                type: boolean
              diff:
                nullable: true
                type: string
              failedDatabases:
                format: uint
                minimum: 0.0
                type: integer
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              phase:
                nullable: true
                type: string
            required:
            - affectedDatabases
            - appliedDatabases
            - approved
            - conditions
            - destructive
            - failedDatabases
            type: object
        required:
        - spec
        title: Rollout
        type: object
    served: true
    storage: true
    subresources:
      status: {}
