apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouts.surreal-dbops.reliquo.io
spec:
  group: surreal-dbops.reliquo.io
  names:
    kind: Rollout
    listKind: RolloutList
    plural: rollouts
    singular: rollout
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [schemaRef, generation]
              properties:
                schemaRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                generation: { type: integer }
                desiredSchema: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                diff: { type: string }
                destructive: { type: boolean }
                affectedDatabases: { type: integer }
                appliedDatabases: { type: integer }
                failedDatabases: { type: integer }
                approved: { type: boolean }
                approvedBy: { type: string }
                approvedAt: { type: string }
                completedAt: { type: string }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      lastTransitionTime: { type: string }
                      reason: { type: string }
                      message: { type: string }
      subresources:
        status: {}
