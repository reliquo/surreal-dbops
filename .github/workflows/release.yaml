name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  release:
    name: Determine and Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.RELIQUO_CI_CLIENT_ID }}
          private-key: ${{ secrets.RELIQUO_CI_PRIVATE_KEY }}
          owner: "reliquo"
          repositories: "surreal-dbops"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Calculate next version (dry run)
        id: semantic_dry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry: true
      - name: Bump version files
        id: bump_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic_dry.outputs.version != ''
        run: |
          NEW_VERSION="${{ steps.semantic_dry.outputs.version }}"
          echo "Bumping versions to $NEW_VERSION"
          
          # Bump Cargo.toml version
          sed -i 's/^version = "[^"]*"/version = "'"$NEW_VERSION"'"/' Cargo.toml
          cargo check
          
          # Bump Chart.yaml version & appVersion
          if [ -f charts/surreal-dbops/Chart.yaml ]; then
            sed -i 's/^version: .*/version: '"$NEW_VERSION"'/' charts/surreal-dbops/Chart.yaml
            sed -i 's/^appVersion: .*/appVersion: "'"$NEW_VERSION"'"/' charts/surreal-dbops/Chart.yaml
          fi
          
          # Stage changes for commit action
          git add Cargo.toml Cargo.lock
          if [ -f charts/surreal-dbops/Chart.yaml ]; then
            git add charts/surreal-dbops/Chart.yaml
          fi

      - name: Commit version bumps
        uses: dsanders11/github-app-commit-action@v2.1.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic_dry.outputs.version != ''
        with:
          owner: reliquo
          repository: surreal-dbops
          message: |
            chore(release): bump version to ${{ steps.semantic_dry.outputs.version }} [skip ci]
          token: ${{ steps.generate_token.outputs.token }}

      - name: Run semantic-release
        id: semantic
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.semantic_dry.outputs.version }},enable=${{ steps.semantic_dry.outputs.version != '' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=surreal-dbops
          cache-to: type=gha,mode=max,scope=surreal-dbops

      - name: Set up Helm
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic_dry.outputs.version != ''
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.12.0

      - name: Log in to GHCR for Helm OCI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic_dry.outputs.version != ''
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm Chart
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic_dry.outputs.version != ''
        run: |
          NEW_VERSION="${{ steps.semantic_dry.outputs.version }}"
          helm repo add jetstack https://charts.jetstack.io
          helm repo add surrealdb https://helm.surrealdb.com
          helm repo update
          helm dependency build charts/surreal-dbops
          helm package charts/surreal-dbops --version "$NEW_VERSION" --app-version "$NEW_VERSION"

      - name: Push Helm Chart OCI Package to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.semantic_dry.outputs.version != ''
        run: |
          NEW_VERSION="${{ steps.semantic_dry.outputs.version }}"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "surreal-dbops-${NEW_VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"
