name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/tags/v{0}', '0.1.0') || true }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package & Publish Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.0

      - name: Log in to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm Chart
        run: |
          # Strip leading 'v' from the git tag to get semver version
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          helm repo add jetstack https://charts.jetstack.io
          helm repo add surrealdb https://helm.surrealdb.com
          helm repo update
          helm dependency build charts/surreal-dbops
          helm package charts/surreal-dbops --version "$VERSION" --app-version "$VERSION"

      - name: Push Helm Chart OCI Package to GHCR
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          # Push OCI chart to ghcr.io/repository_owner/charts
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "surreal-dbops-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"
