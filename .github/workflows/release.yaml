name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build and Publish Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=surreal-dbops
          cache-to: type=gha,mode=max,scope=surreal-dbops

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.12.0

      - name: Log in to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm Chart
        run: |
          # Strip leading 'v' from tag name
          VERSION="${GITHUB_REF_NAME#v}"
          helm repo add jetstack https://charts.jetstack.io
          helm repo add surrealdb https://helm.surrealdb.com
          helm repo update
          helm dependency build charts/surreal-dbops
          helm package charts/surreal-dbops --version "$VERSION" --app-version "$VERSION"

      - name: Push Helm Chart OCI Package to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "surreal-dbops-${VERSION}.tgz" "oci://ghcr.io/${OWNER_LOWER}/charts"
