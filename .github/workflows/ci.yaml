name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Dockerfile'
            helm:
              - 'charts/**'

  fmt:
    name: Format / Rust
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        if: needs.changes.outputs.src == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: nightly
          components: rustfmt

      - name: Format check
        if: needs.changes.outputs.src == 'true'
        uses: clechasseur/rs-fmt-check@v4.0.4

  clippy:
    name: Lint / Rust
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        if: needs.changes.outputs.src == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          components: clippy

      - name: Cache cargo registry and build
        if: needs.changes.outputs.src == 'true'
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy check
        if: needs.changes.outputs.src == 'true'
        uses: clechasseur/rs-clippy-check@v6.0.4
        with:
          args: --all-features

  test:
    name: Test / Rust
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6.0.2

      - name: Install cargo reporter
        if: needs.changes.outputs.src == 'true'
        uses: olix0r/cargo-action-fmt/setup@v2

      - name: Install Rust toolchain
        if: needs.changes.outputs.src == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Cache cargo registry and build
        if: needs.changes.outputs.src == 'true'
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tests-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tests
        if: needs.changes.outputs.src == 'true'
        run: cargo test --no-run --message-format=json | cargo-action-fmt

      - name: Run unit tests
        if: needs.changes.outputs.src == 'true'
        run: cargo test --lib --bins

      - name: Verify CRD schemas are in sync
        if: needs.changes.outputs.src == 'true'
        run: |
          cargo run -- --crdgen > generated_crds.yaml
          python3 -c "
          import os
          content = open('generated_crds.yaml').read()
          parts = content.split('---\n')
          mapping = {
              'instances.surreal-dbops.reliquo.io': 'charts/surreal-dbops/crds/Instance.yaml',
              'namespaces.surreal-dbops.reliquo.io': 'charts/surreal-dbops/crds/Namespace.yaml',
              'databases.surreal-dbops.reliquo.io': 'charts/surreal-dbops/crds/Database.yaml',
              'schemas.surreal-dbops.reliquo.io': 'charts/surreal-dbops/crds/Schema.yaml',
              'rollouts.surreal-dbops.reliquo.io': 'charts/surreal-dbops/crds/Rollout.yaml'
          }
          for part in parts:
              if not part.strip():
                  continue
              name = None
              for line in part.split('\n'):
                  if 'name:' in line:
                      name = line.split('name:')[1].strip()
                      break
              if name in mapping:
                  filename = mapping[name]
                  with open(filename, 'w') as f:
                      f.write(part)
          "
          git diff --exit-code charts/surreal-dbops/crds/

  helm:
    name: Lint / Helm
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: needs.changes.outputs.helm == 'true'
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        if: needs.changes.outputs.helm == 'true'
        uses: azure/setup-helm@v5.0.0

      - name: Set up Python
        if: needs.changes.outputs.helm == 'true'
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.x"
          check-latest: true

      - name: Set up chart-testing
        if: needs.changes.outputs.helm == 'true'
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        if: needs.changes.outputs.helm == 'true'
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }} --config .github/ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: needs.changes.outputs.helm == 'true' && steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --config .github/ct.yaml --check-version-increment=false

  e2e:
    name: Test / End-to-End
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        uses: actions/checkout@v6.0.2

      - name: Set up Helm
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        uses: azure/setup-helm@v5.0.0

      - name: Install Chainsaw
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        uses: kyverno/action-install-chainsaw@v0.1.0
        with:
          release: v0.2.15

      - name: Set up KIND Command Line
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: surreal-dbops-tests
          wait: 120s

      - name: Set up Docker Buildx
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build operator image (cached)
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          tags: ghcr.io/reliquo/surreal-dbops:latest
          load: true
          push: false
          cache-from: type=gha,scope=surreal-dbops-operator-image
          cache-to: type=gha,mode=max,scope=surreal-dbops-operator-image

      - name: Load operator image into KIND
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        run: kind load docker-image ghcr.io/reliquo/surreal-dbops:latest --name surreal-dbops-tests

      - name: Preinstall dependencies
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        run: |
          echo "::group::Adding repositories"
          helm repo add jetstack https://charts.jetstack.io
          helm repo add surrealdb https://helm.surrealdb.com
          helm repo update
          echo "::endgroup::"


          echo "::group::Installing cert-manager CRDs"
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.12.0/cert-manager.crds.yaml
          kubectl wait --for=condition=Established crd/certificates.cert-manager.io --timeout=180s
          kubectl wait --for=condition=Established crd/issuers.cert-manager.io --timeout=180s
          kubectl wait --for=condition=Established crd/clusterissuers.cert-manager.io --timeout=180s
          echo "::endgroup::"

          echo "::group::Installing cert-manager"
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set installCRDs=false
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=180s
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=180s
          kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=180s
          echo "::endgroup::"

          echo "::group::Installing SurrealDB"
          helm upgrade --install surrealdb surrealdb/surrealdb \
            --namespace reliquo-system \
            --create-namespace \
            --set surrealdb.initial_user=root \
            --set surrealdb.initial_pass=rootpassword \
            --set image.tag=v3.1.3
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=surrealdb -n reliquo-system --timeout=180s
          echo "::endgroup::"

      - name: Install surreal-dbops chart
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        run: |
          helm dependency build charts/surreal-dbops
          helm upgrade --install surreal-dbops-e2e ./charts/surreal-dbops \
            --namespace reliquo-system \
            --create-namespace \
            --set image.repository=ghcr.io/reliquo/surreal-dbops \
            --set image.tag=latest \
            --set image.pullPolicy=IfNotPresent \
            --set webhook.certManager.enabled=false
          kubectl wait --for=condition=Available deployment/surreal-dbops-e2e -n reliquo-system --timeout=180s

      - name: Create test results directory
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        run: mkdir -p test-results

      - name: Run Chainsaw Tests
        if: needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true'
        id: chainsaw
        run: |
          chainsaw test \
            --report-format XML \
            --report-name chainsaw-report \
            --report-path test-results

      - name: Detect Chainsaw report
        id: chainsaw_report
        if: (needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true') && (!cancelled())
        run: |
          if [[ -f test-results/chainsaw-report.xml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test Summary
        uses: test-summary/action@v2
        if: (needs.changes.outputs.src == 'true' || needs.changes.outputs.helm == 'true') && (!cancelled())
        with:
          paths: "test-results/chainsaw-report.xml"
