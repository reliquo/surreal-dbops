name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: Rust Format Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          toolchain: nightly
          components: rustfmt

      - name: Format check
        uses: clechasseur/rs-fmt-check@v4.0.4

  clippy:
    name: Rust Clippy Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy check
        uses: clechasseur/rs-clippy-check@v6.0.4
        with:
          args: --all-features

  test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install cargo reporter
        uses: olix0r/cargo-action-fmt/setup@v2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tests-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tests
        run: cargo test --no-run --message-format=json | cargo-action-fmt

      - name: Run unit tests
        run: cargo test --lib --bins

  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - uses: actions/setup-python@v6.0.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.12.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}

  e2e:
    name: E2E Chainsaw Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.1.0
        with:
          release: v0.2.15

      - name: Set up KIND Command Line
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: surreal-dbops-tests
          wait: 120s

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.12.0/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=180s

      - name: Ensure selfsigned ClusterIssuer
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned-issuer
          spec:
            selfSigned: {}
          EOF

      - name: Install SurrealDB
        run: |
          helm repo add surrealdb https://helm.surrealdb.com
          helm repo update
          helm upgrade --install surrealdb surrealdb/surrealdb \
            --namespace reliquo-system \
            --create-namespace \
            --set surrealdb.initial_user=root \
            --set surrealdb.initial_pass=rootpassword \
            --set image.tag=v3.1.3
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=surrealdb -n reliquo-system --timeout=180s

      - name: Build and load operator image
        run: |
          DOCKER_BUILDKIT=1 docker build -t ghcr.io/reliquo/surreal-dbops:latest .
          kind load docker-image ghcr.io/reliquo/surreal-dbops:latest --name surreal-dbops-tests

      - name: Install surreal-dbops operator
        run: |
          helm upgrade --install surreal-dbops ./charts/surreal-dbops \
            --namespace reliquo-system \
            --set image.repository=ghcr.io/reliquo/surreal-dbops \
            --set image.tag=latest \
            --set image.pullPolicy=IfNotPresent \
            --set webhook.enabled=true \
            --set webhook.certManager.enabled=true \
            --set webhook.certManager.generateCert=true
          kubectl wait --for=condition=Available deployment/surreal-dbops -n reliquo-system --timeout=180s

        run: |
          chainsaw test \
            --report-format XML \
            --report-name chainsaw-report \
            --report-path ./test-results
        continue-on-error: true

      - name: Publish Chainsaw report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: (!cancelled())
        with:
          check_name: "Chainsaw E2E Test Results"
          files: "test-results/chainsaw-report.xml"
